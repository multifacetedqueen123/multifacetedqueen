kind = "web"
previewPath = "/"
title = "Creative Beauty & Alterations Studio"
version = "1.0.0"
id = "artifacts/beauty-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22246

[services.development]
run = "pnpm --filter @workspace/beauty-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beauty-studio", "run", "build" ]
publicDir = "artifacts/beauty-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22246"
BASE_PATH = "/"
